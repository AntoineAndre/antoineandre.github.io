<head>
  <link href="https://gmpg.org/xfn/11" rel="profile" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <title>
    {% if page.title == "Home" %}
      {{ site.title }}{% if site.tagline %} &middot; {{ site.tagline }}{% endif %}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  {% include google-analytics.html %}

  <!-- CSS -->
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}" />
  {% include font-includes.html %}

  <!-- Icons -->
  {% include favicons.html %}

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ site.feed.path | default: 'feed.xml' | relative_url }}" />

  {% include custom-head.html %}

   <!-- Map -->
   <meta charset="utf-8">
   <!-- Nous chargeons les fichiers CDN de Leaflet. Le CSS AVANT le JS -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css" integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAacEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
         crossorigin="" />
   <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js" integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
           crossorigin=""></script>
   <script type="text/javascript">
       // On initialise la latitude et la longitude de Besac
       var lat = 47.251771;
       var lon = 6;
       var macarte = null;

       // Nous initialisons une liste de marqueurs
       var villes = {
       "ENSMM Institute": { "lat": 47.250896, "lon": 5.993233 },
       "Femto-St institute": { "lat": 47.253240, "lon": 5.996280 },
       "International congress of Metrology": { "lat": 48.832764, "lon": 2.286558 },
       "Tokyo Denki University": { "lat": 35.748144, "lon": 139.806119 },
       "University of Electro-Communications": { "lat": 35.657447, "lon": 139.542619 },
       "Wakayama university": { "lat": 34.265960, "lon": 135.151532 },
       };

       // Fonction d'initialisation de la carte
       function initMap() {
       // Créer l'objet "macarte" et l'insèrer dans l'élément HTML qui a l'ID "map"
       macarte = L.map('map').setView([lat, lon], 14);
       // Leaflet ne récupère pas les cartes (tiles) sur un serveur par défaut. Nous devons lui préciser où nous souhaitons les récupérer. Ici, openstreetmap.fr
       L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
       // Il est toujours bien de laisser le lien vers la source des données
       attribution: 'données © <a href="//osm.org/copyright">OpenStreetMap</a>/ODbL - rendu <a href="//openstreetmap.fr">OSM France</a>',
       minZoom: 1,
       maxZoom: 20
       }).addTo(macarte);
       // Nous parcourons la liste des villes
       for (ville in villes) {
       var marker = L.marker([villes[ville].lat, villes[ville].lon]).addTo(macarte);
       marker.bindPopup(ville);
       }
       }
       window.onload = function(){
       // Fonction d'initialisation qui s'exécute lorsque le DOM est chargé
       initMap();
       };
   </script>
   <style type="text/css">
       #map { /* la carte DOIT avoir une hauteur sinon elle n'apparaît pas */
           height: 800px;
       }
   </style>
   <title>Carte</title>
</head>
