<!DOCTYPE HTML>
<html>
  <head>
    <title>map apprtements visite</title>
       <!-- Map -->
   <meta charset="utf-8">
   <!-- Nous chargeons les fichiers CDN de Leaflet. Le CSS AVANT le JS -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css" integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAacEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
         crossorigin="" />
   <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js" integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
           crossorigin=""></script>
   <script type="text/javascript">
       // On initialise la latitude et la longitude de Besac
       var lat = 47.251771;
       var lon = 6;
       var macarte = null;

       var greenIcon = new L.Icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });
	   
	var violetIcon = new L.Icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-violet.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var redIcon = new L.Icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var blackIcon = new L.Icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-black.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var orangeIcon = new L.Icon({
            iconUrl: 'https://cdn.rawgit.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

       // Fonction d'initialisation de la carte
       function initMap() {
            // Créer l'objet "macarte" et l'insèrer dans l'élément HTML qui a l'ID "map"
            macarte = L.map('map').setView([lat, lon], 14);
            // Leaflet ne récupère pas les cartes (tiles) sur un serveur par défaut. Nous devons lui préciser où nous souhaitons les récupérer. Ici, openstreetmap.fr
            L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
            // Il est toujours bien de laisser le lien vers la source des données
            attribution: 'données © <a href="//osm.org/copyright">OpenStreetMap</a>/ODbL - rendu <a href="//openstreetmap.fr">OSM France</a>',
            minZoom: 1,
            maxZoom: 20
            }).addTo(macarte);

            var myList = document.querySelector('ul');

            fetch('listeApparts.json')
            .then(function(response) {
            if (!response.ok) {
                throw new Error("HTTP error, status = " + response.status);
            }
            return response.json();
            })
            .then(function(json) {
            for(var i = 0; i < json.appartements.length; i++) {
		var marker = L.marker([json.appartements[i].lat, json.appartements[i].lon]).addTo(macarte);
		if (json.appartements[i].etatVisite == 0){
                   marker.setIcon(redIcon);
			//pas d'info de la part de l'agence
		}else if (json.appartements[i].etatVisite == 1){
                   marker.setIcon(greenIcon);
			//visité
		}else if (json.appartements[i].etatVisite == 2){
                   marker.setIcon(blackIcon);
			//pas louable
		}else if (json.appartements[i].etatVisite == 3){
                   marker.setIcon(orangeIcon);
			//en cours de traitement
		}else if (json.appartements[i].etatVisite == 4){
                   marker.setIcon(violetIcon);
			//the chosen one
		}
		
                marker.bindPopup(i);
		var description = '<p>' + json.appartements[i].agence + '</p>';
		description += '<b>' + json.appartements[i].dispo + '</b>';
		description += '<br /> ' + '<a href=' + json.appartements[i].webLink + '>' + json.appartements[i].description + '</a>'; 
		description += '</p> <p> <img src=' + json.appartements[i].thumbnail + ' width="150"> </p>';
		marker.bindPopup(description);
            }
            })
            .catch(function(error) {
            var p = document.createElement('p');
            p.appendChild(
                document.createTextNode('Error: ' + error.message)
            );
            document.body.insertBefore(p, myList);
            });
       }

       window.onload = function(){
            // Fonction d'initialisation qui s'exécute lorsque le DOM est chargé
            initMap();
       };

   </script>
   <style type="text/css">
       #map { /* la carte DOIT avoir une hauteur sinon elle n'apparaît pas */
           height: 1024px;
       }
   </style>
  </head>
  <body onload="initMap();">
    <div id="map">
	<!-- Ici s'affichera la carte -->
    </div>
  </body>
</html>
