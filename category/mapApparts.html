<!DOCTYPE HTML>
<html>
  <head>
    <title>OpenLayers Demo</title>
       <!-- Map -->
   <meta charset="utf-8">
   <!-- Nous chargeons les fichiers CDN de Leaflet. Le CSS AVANT le JS -->
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css" integrity="sha512-Rksm5RenBEKSKFjgI3a41vrjkw4EVPlJ3+OiI65vTjIdo9brlAacEuKOiQ5OFh7cOI1bkDwLqdLw3Zg0cRJAAQ=="
         crossorigin="" />
   <script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js" integrity="sha512-/Nsx9X4HebavoBvEBuyp3I7od5tA0UzAxs+j83KgC8PU0kgB4XiK4Lfe4y4cgBtaRJQEIFCW+oC506aPT2L1zw=="
           crossorigin=""></script>
   <script type="text/javascript">
       // On initialise la latitude et la longitude de Besac
       var lat = 47.251771;
       var lon = 6;
       var macarte = null;

       // Nous initialisons une liste de marqueurs
       var apparts = {
            "Segerad": { "lat": 47.243867, "lon": 6.047605, "text": '<p>Segerad<br /> <a href="https://segerad.fr/property/bregille-t3-64-m2-residence-2011/">T3 64 m² 687€ </a> </p> <p> <img src="https://segerad.fr/wp-content/uploads/2018/05/DOMAINE-770x386.jpg" width="150"> </p>'},
            "Segerad2": { "lat": 47.244012, "lon": 6.046057, "text": '<p>Segerad<br /> <a href="https://segerad.fr/property/bregille-t3-56-m2-residence-2013/">T3 56 m² 631€ </a> </p> <p> <img src="https://segerad.fr/wp-content/uploads/2017/06/PHOTO-RECTIFIEE.png" width="150"> </p>'},
            "Nexity": { "lat": 47.241560, "lon": 6.047695, "text": '<p>Nexity<br /> <a href="https://www.nexity.fr/location/FL0602295">T2 64 m² 543€ </a> </p> <p> <img src="https://media2-js.nexity.fr/1_539054.jpg?maxWidth=1024&maxHeight=684&default_img=appartement.jpg" width="150"> </p>'},
            "Nexity2": { "lat": 47.241338, "lon": 6.048411, "text": '<p>Nexity<br /> <a href="https://www.nexity.fr/location/FL0659145">T2 64 m² 506€ </a> </p> <p> <img src="https://media2-js.nexity.fr/1_539038.jpg?maxWidth=1024&maxHeight=684&default_img=appartement.jpg" width="150"> </p>'},
            "Nexity3": { "lat": 47.250251, "lon": 6.059861, "text": '<p>Nexity<br /> <a href="https://www.nexity.fr/location/FL0653161">T2 64 m² 515€ </a> </p> <p> <img src="https://media2-js.nexity.fr/1_509406.jpg?maxWidth=1024&maxHeight=684&default_img=appartement.jpg" width="150"> </p>'},
            "Nexity4": { "lat": 47.244497, "lon": 6.050129, "text": '<p>Nexity<br /> <a href="https://www.nexity.fr/location/FL0650622">T3 68 m² 655€ </a> </p> <p> <img src="https://media2-js.nexity.fr/1_968638.jpg?maxWidth=1024&maxHeight=684&default_img=appartement.jpg" width="150"> </p>'},
            "ImmoBenoit": { "lat": 47.251698, "lon": 6.060177, "text": '<p>Cabinet Benoit<br /> <a href="https://www.immobilier-benoit.com/appartement_quartier-bregille_besancon_3_pieces_location_5399.html">T3 54 m² 625€ </a> </p> <p> <img src="https://www.immobilier-benoit.com/geoloc_ressources_immofacile/31059407_2.jpg" width="150"> </p>'},
            "ImmoBenoit2": { "lat": 47.245729, "lon": 6.055246, "text": '<p>Cabinet Benoit<br /> <a href="https://www.immobilier-benoit.com/appartement_quartier-bregille_besancon_3_pieces_location_4295.html">T3 61 m² 610€ </a> </p> <p> <img src="https://www.immobilier-benoit.com/geoloc_ressources_immofacile/31058546_3.jpg" width="150"> </p>'},
            "Bersot": { "lat": 47.249591, "lon": 6.009047, "text": '<p>Immobilier Bersot<br /> <a href="https://www.bersot.net/detail/ref/2564/type_transaction/Location/lieu/besancon/type_bien/Appartement/budget_min/0/budget_max/0.html">T3 65 m² 600€ </a> </p> <p> <img src="https://www.bersot.net/pages/immo/images/location-besancon-appartement-t3-quartier-st-claude-avec-balcon-ds5vn.jpg" width="150"> </p>'},
            "Aici": { "lat": 47.257969, "lon": 6.021015, "text": '<p>Aici<br /> <a href="http://www.aici-immobilier.fr/offre/17460-appartement-f4-besancon-quartier-saint-claude">T3 69 m² 600€ </a> </p> <p> <img src="http://www.aici-immobilier.fr/uploads/offres/thumb_w650h340zc1q95__17460-1.jpg" width="150"> </p>'},
       };

       // Fonction d'initialisation de la carte
       function initMap() {
            // Créer l'objet "macarte" et l'insèrer dans l'élément HTML qui a l'ID "map"
            macarte = L.map('map').setView([lat, lon], 14);
            // Leaflet ne récupère pas les cartes (tiles) sur un serveur par défaut. Nous devons lui préciser où nous souhaitons les récupérer. Ici, openstreetmap.fr
            L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
            // Il est toujours bien de laisser le lien vers la source des données
            attribution: 'données © <a href="//osm.org/copyright">OpenStreetMap</a>/ODbL - rendu <a href="//openstreetmap.fr">OSM France</a>',
            minZoom: 1,
            maxZoom: 20
            }).addTo(macarte);

            // Nous parcourons la liste des apparts
            for (mAppart in apparts) {
                    var marker = L.marker([apparts[mAppart].lat, apparts[mAppart].lon]).addTo(macarte);
                    marker.bindPopup(mAppart);
                    marker.bindPopup(apparts[mAppart].text);
            }
       }

       window.onload = function(){
            // Fonction d'initialisation qui s'exécute lorsque le DOM est chargé
            initMap();
       };

   </script>
   <style type="text/css">
       #map { /* la carte DOIT avoir une hauteur sinon elle n'apparaît pas */
           height: 940px;
       }
   </style>
  </head>
  <body onload="initMap();">
    <div id="map">
	<!-- Ici s'affichera la carte -->
    </div>
  </body>
</html>
